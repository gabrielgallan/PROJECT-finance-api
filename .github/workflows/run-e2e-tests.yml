name: Run E2E Tests

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: bitnami/postgresql
        ports:
          - 5432:5432
        environment:
          - POSTGRESQL_USERNAME=docker
          - POSTGRESQL_PASSWORD=docker
          - POSTGRESQL_DATABASE=smart_finance

    env:
      DATABASE_URL: postgresql://docker:docker@localhost:5432/smart_finance
      JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
      JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
      GITHUB_OAUTH_CLIENT_ID: "clientId"
      GITHUB_OAUTH_CLIENT_SECRET: "clientSecret"
      GITHUB_OAUTH_CLIENT_REDIRECT_URI: "http://localhost:8080/api/auth/callback"
      RESEND_API_KEY: "resendApiKey"
      CLOUDINARY_CLOUD_NAME: "cloudName"
      CLOUDINARY_API_KEY: "cloudApiKey"
      CLOUDINARY_API_SECRET: "cloudApiSecret"
      FRONTEND_BASE_URL: "http://localhost:8080"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Push database schema
        run: pnpm prisma db push

      - name: Run tests
        run: pnpm test:e2e